<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Nelavista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Premium fonts & icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ----- DESIGN TOKENS (dark academic + electric blue/teal) ----- */
    :root {
      --bg-deep: #0b0e14;
      --bg-surface: #161b22;
      --border-premium: #30363d;
      --text-primary: #f0f3f8;
      --text-secondary: #b9c3d1;
      --accent-blue: #00d1ff;
      --accent-teal: #20c997;
      --gradient-blue: linear-gradient(135deg, #00d1ff, #007bff);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.25);
      --shadow-glow: 0 0 30px rgba(0, 209, 255, 0.08);
      --transition-smooth: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      --radius-card: 20px;
      --radius-input: 14px;
      --radius-button: 12px;
    }

    /* Light theme overrides */
    body.light-theme {
      --bg-deep: #f5f7fa;
      --bg-surface: #ffffff;
      --border-premium: #e2e8f0;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --accent-blue: #0284c7;
      --accent-teal: #0d9488;
      --gradient-blue: linear-gradient(135deg, #0284c7, #0ea5e9);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-glow: 0 0 30px rgba(2, 132, 199, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
      animation-delay: 0.1s;
      line-height: 1.5;
    }

    /* ----- GLASSMORPHISM TOP BAR (consistent across pages) ----- */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(11, 14, 20, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1002;
      border-bottom: 1px solid var(--border-premium);
    }

    body.light-theme #top-bar {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
    }

    .brand-logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #a0c0ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    body.light-theme .brand-logo {
      background: linear-gradient(135deg, #0f172a, #0284c7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #theme-toggle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      background: transparent;
      border: 1px solid var(--border-premium);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    #theme-toggle:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent-teal);
    }

    /* Spacer for fixed header */
    .header-spacer {
      height: 64px;
      width: 100%;
    }

    /* ----- ANIMATIONS (soft, staggered) ----- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes subtlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    /* ----- LOGO SECTION (centered below header) ----- */
    .logo-section {
      text-align: center;
      margin: 16px 0 24px;
      animation: fadeInUp 0.7s ease-out forwards;
      opacity: 0;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #a0c0ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    body.light-theme .logo {
      background: linear-gradient(135deg, #0f172a, #0284c7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 500px;
      line-height: 1.5;
      animation: fadeInUp 0.7s ease-out 0.1s forwards;
      opacity: 0;
    }

    /* ----- LOGIN CARD (soft surface, premium borders) ----- */
    .login-container {
      background: var(--bg-surface);
      padding: 2.5rem 2.2rem;
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--border-premium);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.7s ease-out 0.2s forwards;
      margin-bottom: 32px;
      transition: var(--transition-smooth);
    }

    .login-container h1 {
      font-size: 1.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.3s forwards;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.4s forwards;
    }

    /* ----- FLASH MESSAGES (soft, teal accent) ----- */
    .flashes {
      list-style: none;
      padding: 0;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.45s forwards;
    }

    .flashes li {
      background: rgba(32, 201, 151, 0.12);
      color: var(--text-primary);
      padding: 0.9rem 1.2rem;
      margin-bottom: 0.8rem;
      border-radius: var(--radius-input);
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      border: 1px solid rgba(32, 201, 151, 0.3);
      animation: subtlePulse 3s ease-in-out infinite;
      backdrop-filter: blur(4px);
    }

    /* ----- FORM STYLES (soft, spacious) ----- */
    form {
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.5s forwards;
    }

    .form-group {
      margin-bottom: 1.8rem;
      position: relative;
      opacity: 0;
      animation: slideIn 0.6s ease-out forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .form-group:nth-child(1) { animation-delay: 0.5s; }
    .form-group:nth-child(2) { animation-delay: 0.6s; }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.2s;
    }

    .input-wrapper {
      position: relative;
      background: var(--bg-deep);
      border-radius: var(--radius-input);
      border: 1px solid var(--border-premium);
      transition: var(--transition-smooth);
      will-change: transform, border-color, box-shadow;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 209, 255, 0.12);
    }

    body.light-theme .input-wrapper:focus-within {
      box-shadow: 0 8px 20px rgba(2, 132, 199, 0.08);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.95rem 1.1rem;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }

    input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
      font-weight: 400;
    }

    /* ----- PRIMARY CTA – BLUE GRADIENT (soft) ----- */
    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: var(--gradient-blue);
      color: white;
      border: none;
      border-radius: var(--radius-button);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.7s forwards;
      will-change: transform, box-shadow;
      box-shadow: 0 6px 14px rgba(0, 123, 255, 0.25);
      letter-spacing: -0.01em;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(0, 123, 255, 0.35);
      background: linear-gradient(135deg, #1ad9ff, #0088ff);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Loading spinner */
    .submit-btn.loading {
      position: relative;
      color: transparent;
    }

    .submit-btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 22px;
      margin: -11px 0 0 -11px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ----- LINK SECTION (soft divider) ----- */
    .link-section {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--border-premium);
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.8s forwards;
    }

    .link-section p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .link-section a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-smooth);
      border-bottom: 1px solid rgba(0, 209, 255, 0.3);
      padding-bottom: 2px;
    }

    .link-section a:hover {
      color: var(--accent-teal);
      border-bottom-color: var(--accent-teal);
    }

    /* ----- RESPONSIVE & SOFT TOUCHES ----- */
    @media (max-width: 768px) {
      body {
        padding: 0;
        justify-content: flex-start;
      }

      .header-spacer {
        height: 64px;
      }

      .logo-section {
        margin-top: 8px;
      }

      .logo {
        font-size: 2.4rem;
      }

      .login-container {
        padding: 2rem 1.5rem;
        margin: 0 12px 24px;
        max-width: 100%;
        border-radius: 18px;
      }

      .login-container h1 {
        font-size: 1.7rem;
      }

      input, .submit-btn {
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 2rem;
      }

      .login-container {
        padding: 1.8rem 1.2rem;
        border-radius: 16px;
      }
    }

    /* Misc */
    button, input {
      -webkit-tap-highlight-color: transparent;
    }

    i, .ri, .fas {
      font-style: normal;
    }

    /* Shake animation for validation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <!-- GLASS TOP BAR with theme toggle -->
  <header id="top-bar">
    <div></div>
    <div class="brand-logo">Nelavista</div>
    <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
  </header>
  <div class="header-spacer"></div>

  <div class="logo-section">
    <div class="logo">Nelavista</div>
    <div class="tagline">Your AI‑powered learning companion</div>
  </div>

  <div class="login-container">
    <h1>Welcome back</h1>
    <p class="subtitle">Continue your learning journey</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login" autocomplete="off" id="loginForm">
      <div class="form-group">
        <label for="username_or_email">Username or Email</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="username_or_email" 
            name="username_or_email" 
            required 
            autocomplete="username"
            placeholder="Enter your username or email"
            autocapitalize="none"
          />
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            autocomplete="current-password"
            placeholder="Enter your password"
          />
        </div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Log in →</button>
    </form>

    <div class="link-section">
      <p>Don't have an account? <a href="/signup">Sign up here</a></p>
    </div>
  </div>

  <script>
    // ----- THEME TOGGLE (Dark / Light) with localStorage -----
    (function() {
      const themeToggle = document.getElementById('theme-toggle');
      const body = document.body;

      const storedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let currentTheme = storedTheme || (prefersDark ? 'dark' : 'light');

      function applyTheme(theme) {
        if (theme === 'light') {
          body.classList.add('light-theme');
          themeToggle.textContent = '☀️';
        } else {
          body.classList.remove('light-theme');
          themeToggle.textContent = '🌙';
        }
        localStorage.setItem('theme', theme);
      }

      applyTheme(currentTheme);

      themeToggle.addEventListener('click', () => {
        currentTheme = body.classList.contains('light-theme') ? 'dark' : 'light';
        applyTheme(currentTheme);
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
          applyTheme(e.matches ? 'dark' : 'light');
        }
      });
    })();

    // ----- FORM INTERACTIONS & VALIDATION (soft feedback) -----
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const inputs = document.querySelectorAll('input');

      // Soft focus/blur effects
      inputs.forEach(input => {
        input.addEventListener('focus', function() {
          const wrapper = this.closest('.input-wrapper');
          if (wrapper) {
            wrapper.style.borderColor = 'var(--accent-blue)';
            wrapper.style.transform = 'translateY(-2px)';
          }
          const label = this.closest('.form-group')?.querySelector('label');
          if (label) label.style.color = 'var(--accent-blue)';
        });

        input.addEventListener('blur', function() {
          const wrapper = this.closest('.input-wrapper');
          if (wrapper) {
            wrapper.style.borderColor = 'var(--border-premium)';
            wrapper.style.transform = 'translateY(0)';
          }
          const label = this.closest('.form-group')?.querySelector('label');
          if (label) label.style.color = 'var(--text-primary)';
        });
      });

      // Form submission with loading state
      form.addEventListener('submit', function(e) {
        const username = document.getElementById('username_or_email').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          e.preventDefault();
          // Gentle shake for empty fields
          inputs.forEach(input => {
            if (!input.value.trim()) {
              const wrapper = input.closest('.input-wrapper');
              if (wrapper) {
                wrapper.style.animation = 'none';
                setTimeout(() => {
                  wrapper.style.animation = 'shake 0.5s ease-in-out';
                }, 10);
              }
            }
          });
          return;
        }

        // Add loading state
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;
        // Keep button text visible (CSS handles spinner overlay)
      });

      // Auto-focus first input on load
      setTimeout(() => {
        const firstInput = document.querySelector('input[type="text"]');
        if (firstInput) firstInput.focus();
      }, 800);

      // Handle Android WebView
      if (/Android/.test(navigator.userAgent)) {
        document.body.style.webkitOverflowScrolling = 'touch';
      }
    });

    // Page visibility (refresh animations)
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        document.body.style.animation = 'none';
        setTimeout(() => {
          document.body.style.animation = 'fadeIn 0.6s ease-out forwards';
        }, 10);
      }
    });
  </script>
</body>
</html>
