<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Nelavista · Academic Archive</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; }
        body { background:#0d1117; color:#e6edf3; overflow-x:hidden; min-height:100vh; }

        /* ===== TOP BAR ===== */
        .app-container { max-width:1400px; margin:0 auto; padding:0 24px 80px; }
        .top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 0 20px; border-bottom:1px solid #21262d; margin-bottom:28px; gap:12px; flex-wrap:wrap; }
        .left-area { display:flex; align-items:center; gap:16px; }
        .menu-btn { background:transparent; border:none; color:#e6edf3; font-size:22px; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
        .menu-btn:hover { background:#21262d; }
        .logo-area { display:flex; align-items:baseline; gap:8px; }
        .logo-text { font-size:1.4rem; font-weight:700; background:linear-gradient(135deg,#e6edf3,#58a6ff); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:-0.3px; }
        .logo-badge { font-size:0.68rem; background:#14b8a6; padding:2px 8px; border-radius:30px; font-weight:600; color:#0d1117; }
        .right-area { display:flex; align-items:center; gap:16px; }
        .nav-tabs { display:flex; gap:20px; }
        .nav-tab { background:transparent; border:none; font-size:0.95rem; font-weight:500; color:#8b949e; cursor:pointer; padding:6px 0; border-bottom:2px solid transparent; transition:all 0.2s; }
        .nav-tab.active { color:#e6edf3; border-bottom-color:#58a6ff; }
        .nav-tab:hover:not(.active) { color:#c9d1d9; }
        .user-avatar { width:38px; height:38px; background:#21262d; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; color:#58a6ff; border:1px solid #30363d; cursor:pointer; flex-shrink:0; }
        .edit-courses-btn { background:transparent; border:1px solid #30363d; color:#8b949e; padding:6px 14px; border-radius:30px; font-size:0.78rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .edit-courses-btn:hover { border-color:#58a6ff; color:#58a6ff; }

        /* ===== HERO / SEARCH ===== */
        .hero-section { margin-bottom:28px; }
        .hero-title { font-size:1.9rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px; }
        .hero-sub { color:#8b949e; margin-bottom:22px; font-size:0.95rem; }
        .search-wrapper { position:relative; margin-bottom:18px; }
        .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#8b949e; font-size:17px; pointer-events:none; }
        #searchInput { width:100%; padding:13px 16px 13px 46px; background:#161b22; border:1px solid #30363d; border-radius:40px; font-size:0.95rem; color:#e6edf3; outline:none; transition:all 0.2s; }
        #searchInput:focus { border-color:#58a6ff; box-shadow:0 0 0 3px rgba(88,166,255,0.15); }
        #searchInput::placeholder { color:#6e7681; }
        .filter-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
        .filter-row::-webkit-scrollbar { display:none; }
        .filter-pill { background:#21262d; border:none; padding:7px 18px; border-radius:30px; font-size:0.82rem; font-weight:500; color:#8b949e; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
        .filter-pill.active { background:#58a6ff; color:#fff; }
        .filter-pill:hover:not(.active) { background:#30363d; color:#e6edf3; }

        /* ===== MATERIALS GRID ===== */
        .materials-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
        @media(max-width:1024px){ .materials-grid { grid-template-columns:repeat(2,1fr); } }
        @media(max-width:640px){ .materials-grid { grid-template-columns:1fr; } }

        .material-card { background:#161b22; border:1px solid #21262d; border-radius:16px; padding:18px; display:flex; flex-direction:column; cursor:pointer; transition:all 0.2s; }
        .material-card:hover { border-color:#58a6ff; box-shadow:0 6px 20px rgba(88,166,255,0.08); transform:translateY(-2px); }
        .card-top { display:flex; gap:12px; align-items:flex-start; margin-bottom:10px; }
        .material-icon { font-size:26px; flex-shrink:0; }
        .material-title { font-weight:600; font-size:0.95rem; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .dept-tag { font-size:0.72rem; color:#58a6ff; background:rgba(88,166,255,0.1); padding:3px 10px; border-radius:30px; display:inline-block; margin-bottom:10px; width:fit-content; }
        .meta-row { display:flex; justify-content:space-between; font-size:0.68rem; color:#6e7681; margin-bottom:10px; }
        .badge { font-size:0.62rem; font-weight:700; padding:3px 8px; border-radius:30px; display:inline-block; width:fit-content; letter-spacing:0.3px; }
        .card-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:12px; border-top:1px solid #21262d; }
        .pdf-label { font-size:0.68rem; color:#6e7681; }
        .card-icons { display:flex; gap:14px; }
        .card-icons span { cursor:pointer; font-size:17px; transition:opacity 0.2s; }
        .card-icons span:hover { opacity:0.6; }

        .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:#6e7681; font-size:0.95rem; }

        /* ===== ONBOARDING ===== */
        .onboarding-screen { position:fixed; inset:0; background:#0d1117; z-index:2000; overflow-y:auto; padding:32px 20px 80px; }
        .onboarding-inner { max-width:860px; margin:0 auto; }
        .onboarding-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .onboarding-title { font-size:1.8rem; font-weight:700; }
        .onboarding-sub { color:#8b949e; margin-top:6px; font-size:0.92rem; }
        .onboarding-meta { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin:16px 0 24px; }
        .dept-pill { background:#161b22; border:1px solid #30363d; padding:6px 16px; border-radius:30px; font-size:0.85rem; color:#8b949e; }
        .select-all-btn { background:transparent; border:none; color:#58a6ff; font-size:0.85rem; cursor:pointer; padding:4px 0; }
        .select-all-btn:hover { text-decoration:underline; }

        .section-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#6e7681; margin:20px 0 12px; padding-bottom:8px; border-bottom:1px solid #21262d; }

        .courses-grid { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:8px; }
        .course-chip { background:#161b22; border:2px solid #21262d; border-radius:14px; padding:14px 16px; cursor:pointer; transition:all 0.18s; min-width:160px; flex:1 0 auto; max-width:220px; position:relative; }
        .course-chip:hover { border-color:#30363d; background:#1c2129; }
        .course-chip.selected { background:rgba(20,184,166,0.1); border-color:#14b8a6; }
        .chip-code { font-weight:700; font-size:0.95rem; color:#e6edf3; }
        .chip-name { font-size:0.72rem; color:#8b949e; margin-top:4px; line-height:1.3; }
        .chip-check { position:absolute; top:10px; right:10px; color:#14b8a6; font-size:14px; font-weight:700; opacity:0; transition:opacity 0.15s; }
        .course-chip.selected .chip-check { opacity:1; }

        .selected-count { font-size:0.82rem; color:#8b949e; margin-bottom:20px; }
        .selected-count span { color:#14b8a6; font-weight:600; }

        .continue-btn { background:#14b8a6; border:none; padding:15px 28px; border-radius:40px; font-weight:700; font-size:1rem; color:#0d1117; width:100%; cursor:pointer; transition:all 0.2s; position:sticky; bottom:20px; }
        .continue-btn:disabled { opacity:0.35; cursor:not-allowed; }
        .continue-btn:not(:disabled):hover { background:#0d9488; }

        /* ===== FAB ===== */
        .fab { position:fixed; bottom:28px; right:24px; background:#14b8a6; width:54px; height:54px; border-radius:50%; border:none; font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(20,184,166,0.35); z-index:100; transition:transform 0.15s; }
        .fab:hover { transform:scale(1.04); }

        /* ===== UPLOAD MODAL ===== */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(6px); z-index:3000; align-items:center; justify-content:center; }
        .modal.show { display:flex; }
        .modal-card { background:#161b22; border:1px solid #30363d; border-radius:24px; width:92%; max-width:520px; max-height:88vh; overflow-y:auto; padding:26px; }
        .modal-card h3 { font-size:1.4rem; font-weight:700; margin-bottom:18px; }
        .upload-form label { display:block; font-size:0.8rem; color:#8b949e; margin-bottom:6px; font-weight:500; }
        .upload-form .fg { margin-bottom:14px; }
        .upload-form input, .upload-form select, .upload-form textarea { width:100%; background:#0d1117; border:1px solid #30363d; padding:11px 14px; border-radius:12px; color:#e6edf3; font-size:0.9rem; outline:none; transition:border 0.2s; }
        .upload-form input:focus, .upload-form select:focus { border-color:#58a6ff; }
        .upload-form textarea { resize:vertical; min-height:72px; }
        .upload-submit-btn { background:#58a6ff; border:none; padding:13px; border-radius:40px; font-weight:700; font-size:0.95rem; width:100%; cursor:pointer; color:#0d1117; margin-top:6px; transition:opacity 0.2s; }
        .upload-submit-btn:hover { opacity:0.88; }
        .modal-cancel { margin-top:10px; width:100%; background:transparent; border:1px solid #30363d; color:#8b949e; padding:10px; border-radius:40px; cursor:pointer; font-size:0.88rem; transition:all 0.2s; }
        .modal-cancel:hover { border-color:#58a6ff; color:#58a6ff; }
        .upload-progress { display:none; background:#21262d; border-radius:4px; overflow:hidden; margin:8px 0; }
        .upload-progress-fill { width:0%; height:4px; background:#58a6ff; transition:width 0.3s; }

        @media(max-width:600px) {
            .top-bar { flex-direction:column; align-items:stretch; }
            .left-area { justify-content:space-between; }
            .right-area { justify-content:space-between; }
            .onboarding-title { font-size:1.4rem; }
            .course-chip { min-width:140px; max-width:none; flex:1 0 140px; }

    </style>
</head>
<body>

<!-- onboarding renders here -->
<div id="onboardingRoot"></div>

<!-- main app (hidden until courses selected) -->
<div id="mainApp" style="display:none;">
    <div class="app-container">
        <div class="top-bar">
            <div class="left-area">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="logo-area">
                    <span class="logo-text">Academic Archive</span>
                    <span class="logo-badge">Nelavista</span>
                </div>
            </div>
            <div class="right-area">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-tab="library">Library</button>
                    <button class="nav-tab" data-tab="study">Study</button>
                    <button class="nav-tab" data-tab="pulse">Pulse</button>
                </div>
                <button class="edit-courses-btn" id="editCoursesBtn">✏️ Edit Courses</button>
                <div class="user-avatar">{{ user.name[:2].upper() if user.name else 'SN' }}</div>
            </div>
        </div>

        <div class="hero-section">
            <h1 class="hero-title">Find your next breakthrough.</h1>
            <p class="hero-sub">Search through thousands of peer-reviewed notes, textbooks, and archived exam materials.</p>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search materials, faculty, or topics…">
            </div>
            <div class="filter-row" id="filterRow">
                <button class="filter-pill active" data-filter="all">All</button>
                <button class="filter-pill" data-filter="PAST QUESTIONS">Past Questions</button>
                <button class="filter-pill" data-filter="TEXTBOOK">Textbooks</button>
                <button class="filter-pill" data-filter="LECTURE NOTES">Lecture Notes</button>
                <button class="filter-pill" data-filter="NOTE">Notes</button>
                <button class="filter-pill" data-filter="STUDY MATERIAL">Study Materials</button>
            </div>
        </div>

        <div class="materials-grid" id="materialsGrid">
            <div class="empty-state">Loading your materials…</div>
        </div>
    </div>
</div>

<button class="fab" id="fabBtn">+</button>

<!-- Upload Modal -->
<div id="uploadModal" class="modal">
    <div class="modal-card">
        <h3>📤 Share Your PDF</h3>
        <form id="uploadForm" onsubmit="handleUpload(event)" class="upload-form">
            <div class="fg"><label>Title *</label><input type="text" id="materialTitle" placeholder="e.g. BCH 201 – Enzyme Kinetics" required></div>
            <div class="fg"><label>Course *</label>
                <select id="materialCourse" required>
                    <option value="">Select Course</option>
                    <option>Biochemistry</option><option>Mathematics</option><option>Computer Science</option>
                    <option>Biology</option><option>Chemistry</option><option>Physics</option>
                    <option>Accounting</option><option>Agriculture</option><option>Business Administration</option>
                    <option>Information Technology</option><option>Zoology</option>
                    <option>Science Laboratory Technology</option><option>Entrepreneurship</option>
                </select>
            </div>
            <div class="fg"><label>Level *</label>
                <select id="materialLevel" required>
                    <option value="">Select Level</option>
                    <option value="100">100 Level</option><option value="200">200 Level</option>
                    <option value="300">300 Level</option><option value="400">400 Level</option>
                </select>
            </div>
            <div class="fg"><label>Semester *</label>
                <select id="materialSemester" required>
                    <option value="">Select Semester</option>
                    <option value="First Semester">First Semester</option>
                    <option value="Second Semester">Second Semester</option>
                </select>
            </div>
            <div class="fg"><label>Course Code *</label><input type="text" id="materialCode" placeholder="e.g. BCH201" required></div>
            <div class="fg"><label>Author / Your Name</label><input type="text" id="materialAuthor" value="{{ user.name or '' }}"></div>
            <div class="fg"><label>Description (optional)</label><textarea id="materialDesc" placeholder="Brief description…"></textarea></div>
            <div class="fg"><label>PDF File *</label><input type="file" id="materialFile" accept=".pdf" required></div>
            <div class="upload-progress" id="uploadProgress"><div class="upload-progress-fill" id="uploadProgressFill"></div></div>
            <button type="submit" class="upload-submit-btn" id="uploadSubmitBtn">📤 Upload & Share</button>
            <button type="button" class="modal-cancel" onclick="closeUploadModal()">Cancel</button>
        </form>
    </div>
</div>

//  STORAGE KEY — unique per student level + department

// ============================================================
//  BADGE HELPER
// ============================================================
function getBadge(title) {
    const t = title.toLowerCase();
    if (t.includes('past question') || t.includes('oer') || t.includes('test') || t.includes('exam') || t.includes('multiple choice') || t.includes('mcq')) return { label:'PAST QUESTIONS', color:'#f97316' };
    if (t.includes('lecture') || t.includes('lesson')) return { label:'LECTURE NOTES', color:'#8b5cf6' };
    if (t.includes('textbook') || t.includes('vol') || t.includes('edition') || t.includes('introduction to') || t.includes('principles of') || t.includes('fundamentals')) return { label:'TEXTBOOK', color:'#3b82f6' };
    if (t.includes('note') || t.includes('compilation') || t.includes('summary')) return { label:'NOTE', color:'#6b7280' };
    return { label:'STUDY MATERIAL', color:'#14b8a6' };
}

// ============================================================
//  STATE
// ============================================================
let selectedCourses = [];
let uploadedMaterials = [];
let currentFilter = 'all';
let searchQuery = '';

// ============================================================
//  ONBOARDING — show ALL courses for this level + department
// ============================================================
function showOnboarding(preSelected) {
    // Get course list for this department + level
    const courseList = (COURSE_CODES_DB[userDepartment] || {})[userLevelNum] || [];

    // If no courses found in DB for this dept/level, show empty with note
    const hasCourses = courseList.length > 0;

    const root = document.getElementById('onboardingRoot');
    root.innerHTML = `
        <div class="onboarding-screen" id="onboardingScreen">
            <div class="onboarding-inner">
                <div class="onboarding-top">
                    <div>
                        <div class="logo-area" style="margin-bottom:8px;">
                            <span class="logo-text">Academic Archive</span>
                            <span class="logo-badge">Nelavista</span>
                        </div>
                        <h2 class="onboarding-title">📚 Choose Your Courses</h2>
                        <p class="onboarding-sub">Select the course codes you are studying this semester. You can always edit this later.</p>
                    </div>
                </div>

                <div class="onboarding-meta">
                    <div class="dept-pill">🎓 ${userDepartment} &nbsp;•&nbsp; ${userLevel} Level</div>
                    <button class="select-all-btn" id="selectAllBtn">Select All</button>
                </div>

                ${hasCourses ? `
                    <div class="section-label">${userDepartment} courses at ${userLevel} Level</div>
                    <div class="courses-grid" id="coursesGrid"></div>
                ` : `
                    <div style="background:#161b22; border:1px solid #30363d; border-radius:14px; padding:24px; text-align:center; color:#8b949e; margin-bottom:24px;">
                        <div style="font-size:2rem; margin-bottom:8px;">🔍</div>
                        <div style="font-weight:600; color:#e6edf3; margin-bottom:4px;">No course codes found</div>
                        <div style="font-size:0.85rem;">Course codes for ${userDepartment} ${userLevel} Level are not yet in our database. You can still browse all available materials.</div>
                    </div>
                `}

                <div class="selected-count" id="selectedCount">
                    <span id="countNum">0</span> courses selected
                </div>

                <button class="continue-btn" id="continueBtn" ${hasCourses ? 'disabled' : ''}>
                    ${hasCourses ? 'Continue to Library →' : 'Browse All Materials →'}
                </button>
            </div>
        </div>
    `;

    if (!hasCourses) {
        document.getElementById('continueBtn').onclick = () => {
            localStorage.setItem(getStorageKey(), JSON.stringify([]));
            document.getElementById('onboardingRoot').innerHTML = '';
            launchMainApp([]);
        };
        return;
    }

    // Render course chips
    const grid = document.getElementById('coursesGrid');
    let tempSelected = preSelected ? [...preSelected] : [];

    function updateCount() {
        document.getElementById('countNum').textContent = tempSelected.length;
        document.getElementById('continueBtn').disabled = tempSelected.length === 0;
    }

    courseList.forEach(c => {
        const chip = document.createElement('div');
        chip.className = 'course-chip' + (tempSelected.includes(c.code) ? ' selected' : '');
        chip.innerHTML = `<span class="chip-code">${c.code}</span><span class="chip-name">${c.name}</span><span class="chip-check">✓</span>`;
        chip.addEventListener('click', () => {
            chip.classList.toggle('selected');
            if (chip.classList.contains('selected')) {
                if (!tempSelected.includes(c.code)) tempSelected.push(c.code);
            } else {
                tempSelected = tempSelected.filter(x => x !== c.code);
            }
            updateCount();
        });
        grid.appendChild(chip);
    });

    updateCount();

    // Select all button
    document.getElementById('selectAllBtn').addEventListener('click', () => {
        const allSelected = tempSelected.length === courseList.length;
        if (allSelected) {
            // deselect all
            tempSelected = [];
            document.querySelectorAll('.course-chip').forEach(c => c.classList.remove('selected'));
        } else {
            // select all
            tempSelected = courseList.map(c => c.code);
            document.querySelectorAll('.course-chip').forEach(c => c.classList.add('selected'));
        }
        document.getElementById('selectAllBtn').textContent = allSelected ? 'Select All' : 'Deselect All';
        updateCount();
    });

    // Continue button
    document.getElementById('continueBtn').onclick = () => {
        if (tempSelected.length === 0) return;
        localStorage.setItem(getStorageKey(), JSON.stringify(tempSelected));
        document.getElementById('onboardingRoot').innerHTML = '';
        launchMainApp(tempSelected);
    };
}

// ============================================================
//  FETCH UPLOADED MATERIALS FROM BACKEND
// ============================================================
async function fetchUploadedMaterials() {
    try {
        const res = await fetch('/api/fetch-materials?course=&level=&semester=');
        if (res.ok) {
            const data = await res.json();
            uploadedMaterials = (data.materials || []).map(m => ({
                ...m,
                isStatic: false,
                courseCode: m.course_code || '',
                link: m.file_url || ''
            }));
        }
    } catch(e) {
        uploadedMaterials = [];
    }
}

// ============================================================
//  RENDER LIBRARY
// ============================================================
function getMaterialsToShow() {
    const all = [...staticMaterials, ...uploadedMaterials];
    
    // If no courses selected, show everything
    if (!selectedCourses.length) return all;
    
    // Get user's current semester from Jinja2 variable
    const userSemester = "{{ user.semester or '' }}"; // e.g. "First Semester" or "Second Semester"
    
    // Filter by selected course codes AND semester
    return all.filter(m => {
        const matchesCourse = selectedCourses.includes(m.courseCode);
        const matchesSemester = !userSemester || m.semester === userSemester;
        return matchesCourse && matchesSemester;
    });
}

function applySearchAndFilter(materials) {
    let result = [...materials];
    if (currentFilter !== 'all') {
        result = result.filter(m => getBadge(m.title).label === currentFilter);
    }
    if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        result = result.filter(m =>
            m.title.toLowerCase().includes(q) ||
            (m.author || '').toLowerCase().includes(q) ||
            (m.course || '').toLowerCase().includes(q) ||
            (m.courseCode || '').toLowerCase().includes(q)
        );
    }
    return result;
}

function renderLibrary() {
    const base = getMaterialsToShow();
    const final = applySearchAndFilter(base);
    const grid = document.getElementById('materialsGrid');

    if (!final.length) {
        grid.innerHTML = `<div class="empty-state">✨ No materials found for your selection. Try another filter or <a href="#" style="color:#58a6ff;" onclick="document.getElementById('searchInput').value=''; searchQuery=''; renderLibrary();">clear search</a>.</div>`;
        return;
    }

    grid.innerHTML = final.map(m => {
        const badge = getBadge(m.title);
        const icon = badge.label === 'PAST QUESTIONS' ? '📝' : (badge.label === 'TEXTBOOK' ? '📚' : (badge.label === 'LECTURE NOTES' ? '📖' : '📘'));
        const dept = m.course || 'General';
        const safeLink = (m.link || '').replace(/'/g, "\\'");
        const safeTitle = m.title.replace(/'/g, "\\'");
        return `
            <div class="material-card" onclick="openMaterial('${safeLink}','${safeTitle}')">
                <div class="card-top">
                    <span class="material-icon">${icon}</span>
                    <div class="material-title">${m.title}</div>
                </div>
                <div class="dept-tag">${dept}</div>
                <div class="meta-row">
                    <span>📄 PDF</span>
                    <span>${m.courseCode || ''}</span>
                </div>
                <div class="badge" style="background:${badge.color}22; color:${badge.color}; border:1px solid ${badge.color}44;">${badge.label}</div>
                <div class="card-bottom">
                    <span class="pdf-label">📌 ${m.author || 'Unknown'}</span>
                    <div class="card-icons">
                        <span title="Bookmark">🔖</span>
                        <span title="Download" onclick="event.stopPropagation(); downloadMaterial('${safeLink}','${safeTitle}')">⬇️</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function openMaterial(link, title) {
    if (!link) return alert('File not available.');
    window.open(link, '_blank');
}

function downloadMaterial(link, title) {
    if (!link) return alert('File not available.');
    const a = document.createElement('a');
    a.href = link;
    a.download = (title || 'document').replace(/[^a-z0-9]/gi, '_') + '.pdf';
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ============================================================
//  LAUNCH MAIN APP
// ============================================================
async function launchMainApp(courses) {
    selectedCourses = courses;
    document.getElementById('mainApp').style.display = 'block';

    await fetchUploadedMaterials();
    renderLibrary();

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
        searchQuery = e.target.value;
        renderLibrary();
    });

    // Filter pills
    document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderLibrary();
        });
    });

    // Nav tabs
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            if (tab.dataset.tab !== 'library') alert('Coming soon!');
        });
    });

    // Menu → dashboard
    document.getElementById('menuBtn').onclick = () => window.location.href = '/dashboard';

    // Edit courses button
    document.getElementById('editCoursesBtn').onclick = () => {
        const saved = JSON.parse(localStorage.getItem(getStorageKey()) || '[]');
        document.getElementById('mainApp').style.display = 'none';
        showOnboarding(saved);
    };

    // FAB upload
    document.getElementById('fabBtn').onclick = () => openUploadModal();
}

// ============================================================
//  UPLOAD MODAL
// ============================================================
function openUploadModal() { document.getElementById('uploadModal').classList.add('show'); }
function closeUploadModal() { document.getElementById('uploadModal').classList.remove('show'); }

async function handleUpload(e) {
    e.preventDefault();
    const btn = document.getElementById('uploadSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';
    const progressDiv = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('uploadProgressFill');
    progressDiv.style.display = 'block';

    const formData = new FormData();
    formData.append('file',        document.getElementById('materialFile').files[0]);
    formData.append('title',       document.getElementById('materialTitle').value);
    formData.append('course',      document.getElementById('materialCourse').value);
    formData.append('level',       document.getElementById('materialLevel').value);
    formData.append('semester',    document.getElementById('materialSemester').value);
    formData.append('course_code', document.getElementById('materialCode').value);
    formData.append('author',      document.getElementById('materialAuthor').value);
    formData.append('description', document.getElementById('materialDesc').value);

    try {
        // Fake progress
        let pct = 0;
        const interval = setInterval(() => { pct = Math.min(pct + 15, 85); progressFill.style.width = pct + '%'; }, 300);

        const res = await fetch('/api/upload-material', { method:'POST', body:formData });
        clearInterval(interval);
        progressFill.style.width = '100%';
        const data = await res.json();

        if (data.success) {
            closeUploadModal();
            document.getElementById('uploadForm').reset();
            await fetchUploadedMaterials();
            renderLibrary();
        } else {
            alert('Upload failed: ' + (data.error || 'Unknown error'));
        }
    } catch(err) {
        alert('Upload error: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '📤 Upload & Share';
        progressDiv.style.display = 'none';
        progressFill.style.width = '0%';
    }
}

window.handleUpload = handleUpload;
window.closeUploadModal = closeUploadModal;

// ============================================================
//  INIT
// ============================================================
(function init() {
    const saved = localStorage.getItem(getStorageKey());
    if (saved === null) {
        // First visit — show onboarding
        showOnboarding(null);
    } else {
        const parsed = JSON.parse(saved);
        launchMainApp(parsed);
    }
})();
</script>
