<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline – Nelavista</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #0A0A0A;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .offline-container {
      max-width: 400px;
    }
    .icon-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D9FF, #0099CC);
      margin-bottom: 30px;
    }
    .icon-circle svg {
      width: 45px;
      height: 45px;
      fill: none;
      stroke: white;
      stroke-width: 2;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #00D9FF;
      font-weight: 700;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.85;
      margin-bottom: 30px;
    }
    .retry-btn {
      background: #00D9FF;
      color: #0A0A0A;
      border: none;
      padding: 12px 28px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 10px rgba(0,217,255,0.25);
    }
    .retry-btn:active {
      transform: scale(0.96);
      background: #00B8E0;
    }
    .reconnect-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 25px;
      font-size: 13px;
      opacity: 0.7;
    }
    .pulsing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #00D9FF;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
      100% { opacity: 0.4; transform: scale(1); }
    }
    @media (prefers-color-scheme: light) {
      body {
        background-color: #f4f4f4;
        color: #222;
      }
      h1 {
        color: #007A99;
      }
      .retry-btn {
        background: #007A99;
        color: #fff;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <!-- Offline icon: circle with wifi slash -->
    <div class="icon-circle">
      <svg viewBox="0 0 24 24">
        <path d="M5 2L2 5L12 15L22 5L19 2" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M8 6L6 8" stroke-linecap="round"/>
        <path d="M10 9L12 11L14 9" stroke-linecap="round"/>
        <circle cx="12" cy="18" r="1" fill="white" stroke="none"/>
      </svg>
    </div>
    <h1>You’re Offline</h1>
    <p>It looks like your internet connection was lost. Please check your network and try again. Nelavista will automatically reload when you’re back online.</p>
    <button class="retry-btn" onclick="location.reload()">Retry Connection</button>
    <div class="reconnect-indicator">
      <span class="pulsing-dot"></span>
      <span>Attempting to reconnect…</span>
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', function() {
      location.reload();
    });
    // If already online (edge case), go to homepage
    if (navigator.onLine) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
