<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nelavista - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050810;
      color: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .offline-container {
      text-align: center;
      max-width: 400px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #38bdf8, #2dd4bf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #8fa8c8;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .offline-features {
      background: rgba(15, 24, 37, 0.8);
      border: 1px solid #1c2a3a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .offline-features h3 {
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: #38bdf8;
    }
    .offline-features ul {
      list-style: none;
    }
    .offline-features li {
      padding: 8px 0;
      font-size: 0.85rem;
      color: #8fa8c8;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .offline-features li:last-child {
      border-bottom: none;
    }
    .retry-btn {
      display: inline-block;
      background: linear-gradient(135deg, #38bdf8, #3b82f6);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>Don't worry! Nelavista still works offline. You can access previously viewed content.</p>
    
    <div class="offline-features">
      <h3>Available Offline:</h3>
      <ul>
        <li>✅ Previously viewed study materials</li>
        <li>✅ Cached course pages</li>
        <li>✅ Downloaded resources</li>
        <li>❌ AI Tutor (requires internet)</li>
        <li>❌ Live Meetings (requires internet)</li>
      </ul>
    </div>
    
    <button class="retry-btn" onclick="location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
