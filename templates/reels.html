<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Nelavista · TikTok style reels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #top-bar-title {
            font-weight: 600;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .right-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #admin-btn.admin-active {
            background: #4caf50;
            border-color: #4caf50;
            color: black;
        }

        .tab-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            padding: 8px 16px;
            gap: 10px;
            z-index: 999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #a0a0a0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95rem;
        }

        .tab.active {
            background: white;
            color: black;
            border-color: white;
            font-weight: 600;
        }

        /* Global filter bar (only shown on Uploaded tab) */
        #search-bar-container {
            position: fixed;
            top: 116px;
            left: 16px;
            right: 16px;
            z-index: 998;
            transition: opacity 0.2s;
        }

        .search-bar {
            width: 100%;
            height: 52px;
            background: #1a1a1a;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .search-bar:hover {
            background: #252525;
            border-color: rgba(255,255,255,0.2);
        }

        .search-bar .search-icon {
            font-size: 1.2rem;
            margin-right: 12px;
            opacity: 0.7;
        }

        .search-bar .placeholder {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.7;
        }

        /* YouTube course selector UI (inside reel container) */
        .youtube-course-panel {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #000;
            text-align: center;
        }

        .course-selector-box {
            width: 100%;
            max-width: 400px;
            background: #1a1a1a;
            border-radius: 48px;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
        }

        .course-selector-box select {
            width: 100%;
            padding: 14px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            cursor: pointer;
        }

        .course-selector-box button {
            width: 100%;
            background: white;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            cursor: pointer;
            color: black;
            transition: 0.2s;
        }

        .course-selector-box button:active {
            transform: scale(0.96);
        }

        .search-prompt-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .search-prompt-text {
            color: #aaa;
            font-size: 1rem;
            margin-top: 12px;
        }

        #reel-container {
            position: fixed;
            top: 176px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 0;
            background: black;
        }

        /* When YouTube tab active, reel-container starts at top bar (since filter hidden) */
        body.youtube-tab-active #reel-container {
            top: 116px;
        }

        .reel-item {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel-media {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            aspect-ratio: 9 / 16;
            max-height: 100vh;
            width: auto;
            position: relative;
        }

        .reel-media video,
        .reel-media iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            border: none;
            image-rendering: auto;
        }

        .reel-media iframe {
            pointer-events: auto;
        }

        /* Loading overlay for videos */
        .video-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.2s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .video-overlay-right {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            z-index: 20;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .overlay-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            filter: drop-shadow(0 2px 4px black);
            transition: 0.2s;
        }

        .overlay-btn span {
            font-size: 0.9rem;
            margin-top: 4px;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .overlay-btn.liked {
            color: #ff4d6d;
        }

        .delete-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 25;
        }

        .delete-btn {
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .video-info-bottom {
            position: absolute;
            bottom: 30px;
            left: 16px;
            right: 70px;
            z-index: 15;
            color: white;
            text-shadow: 0 1px 3px black;
        }

        .creator-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .caption {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
            margin-right: 6px;
        }

        .empty-reel {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #aaa;
            font-size: 1.2rem;
            padding: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            background: #333;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .upload-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 40px;
        }

        .toggle-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .toggle-option.active {
            background: white;
            color: black;
        }

        .upload-form input,
        .upload-form select,
        .upload-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
        }

        .upload-form input[type="file"] {
            padding: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: white;
            color: black;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }

        .filter-select {
            width: 100%;
            padding: 14px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-secondary {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <button id="back-btn" onclick="goBack()">←</button>
        <div id="top-bar-title">🎓 Nelavista Reels</div>
        <div class="right-buttons">
            <button class="icon-btn" id="upload-btn" onclick="openUploadModal()">➕</button>
            <button class="icon-btn" id="admin-btn" onclick="toggleAdmin()">🔑</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" id="tabUploaded" onclick="switchTab('uploaded')">📤 Uploaded</div>
        <div class="tab" id="tabYoutube" onclick="switchTab('youtube')">🎬 YouTube</div>
    </div>

    <div id="search-bar-container">
        <div class="search-bar" onclick="openSearchModal()">
            <span class="search-icon">🔍</span>
            <span class="placeholder">Filter videos...</span>
        </div>
    </div>

    <div id="reel-container"></div>

    <div id="searchModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔍 Filter videos</h2>
                <button class="close-modal" onclick="closeSearchModal()">✕</button>
            </div>
            <div id="searchModalBody"></div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ Create</h2>
                <button class="close-modal" onclick="closeUploadModal()">✕</button>
            </div>
            <div class="upload-toggle" id="uploadToggle">
                <div class="toggle-option active" data-type="file">📁 Video file</div>
                <div class="toggle-option" data-type="youtube">🔗 YouTube link</div>
            </div>
            <form id="uploadForm" class="upload-form" onsubmit="handleUpload(event)">
                <div id="fileUploadFields">
                    <input type="text" id="videoTitle" placeholder="Title *">
                    <select id="videoCourse">
                        <option value="">Select Course</option>
                        <option value="Biochemistry">Biochemistry</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                    <select id="videoLevel">
                        <option value="">Select Level *</option>
                        <option value="100">100 Level</option>
                        <option value="200">200 Level</option>
                        <option value="300">300 Level</option>
                        <option value="400">400 Level</option>
                    </select>
                    <select id="videoSemester">
                        <option value="">Select Semester</option>
                        <option value="First Semester">First Semester</option>
                        <option value="Second Semester">Second Semester</option>
                    </select>
                    <input type="text" id="videoCreator" placeholder="Your name *">
                    <input type="file" id="videoFile" accept="video/*">
                    <small style="color:#aaa;">Max 100MB</small>
                </div>
                <div id="youtubeUploadFields" class="hidden">
                    <input type="text" id="ytTitle" placeholder="Title *">
                    <select id="ytCourse">
                        <option value="">Select Course</option>
                        <option value="Biochemistry">Biochemistry</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                    <select id="ytLevel">
                        <option value="">Level (optional)</option>
                        <option value="100">100 Level</option>
                        <option value="200">200 Level</option>
                        <option value="300">300 Level</option>
                        <option value="400">400 Level</option>
                    </select>
                    <select id="ytSemester">
                        <option value="">Select Semester</option>
                        <option value="First Semester">First Semester</option>
                        <option value="Second Semester">Second Semester</option>
                    </select>
                    <input type="text" id="ytCreator" placeholder="Your name *">
                    <input type="url" id="ytLink" placeholder="YouTube URL *">
                    <small style="color:#aaa;">Only educational content</small>
                </div>
                <button type="submit" class="submit-btn" id="publishBtn">🚀 Publish</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // ---------- PRELOADED COURSE VIDEOS (from user data) ----------
            const courseVideosData = [
                {"course": "Accountancy", "caption": "Financial Statements Basics", "video_url": "https://youtu.be/fb7YCVR5fIU?si=XWozkxGoBV2HP2HW"},

                {"course": "Biochemistry", "caption": "Protein Synthesis", "video_url": "https://youtu.be/8wAwLwJAGHs?si=vDuhcZbjQ0nNyhoL"},
                {"course": "Biochemistry", "caption": "Biochemical Techniques", "video_url": "https://youtu.be/lDWL_EEhReo?si=F4nhulNv3l0nxRcA"},
                {"course": "Botany", "caption": "Plant Classification", "video_url": "https://youtu.be/SAM5mcHkSxU?si=P1cX_dbg0pGJFDBB"},
                {"course": "Botany", "caption": "Photosynthesis Process", "video_url": "https://youtu.be/-ZRsLhaukn8?si=CfNMcb-tVWwq6-be"},
                {"course": "Botany", "caption": "Plant Anatomy", "video_url": "https://youtu.be/pvVvCt6Kdp8?si=3ubgF8WibXgzFLcI"},
                {"course": "Botany", "caption": "Plant Reproduction", "video_url": "https://youtu.be/h077JEQ8w6g?si=O5vHjcnuPetMLbCo"},

            ];

            // Extract unique course names
            const uniqueCourses = [...new Map(courseVideosData.map(v => [v.course, v.course])).values()].sort();

            // ---------- STATE ----------
            let currentTab = 'uploaded';
            let isAdmin = false;
            let uploadedVideos = [];
            let youtubeReels = [];
            let youtubeSearchResults = [];
            let searchFilters = { course: '', level: '', semester: '' };
            
            let localLikes = new Map();
            let localViews = new Map();
            
            // ---------- AUDIO CONTROL STATE ----------
            let userInteracted = false;
            let activeReelElement = null;
            let viewCountedSet = new Set();
            let isManuallyUnmuted = false;

            // ---------- DOM elements ----------
            const reelContainer = document.getElementById('reel-container');
            const tabUploaded = document.getElementById('tabUploaded');
            const tabYoutube = document.getElementById('tabYoutube');
            const adminBtn = document.getElementById('admin-btn');
            const searchModal = document.getElementById('searchModal');
            const searchModalBody = document.getElementById('searchModalBody');
            const uploadModal = document.getElementById('uploadModal');
            const uploadToggle = document.getElementById('uploadToggle');
            const fileFields = document.getElementById('fileUploadFields');
            const youtubeFields = document.getElementById('youtubeUploadFields');
            const publishBtn = document.getElementById('publishBtn');
            const searchBarContainer = document.getElementById('search-bar-container');
            
            let currentUploadType = 'file';

            function updateGlobalFilterVisibility() {
                if (currentTab === 'uploaded') {
                    searchBarContainer.style.display = 'block';
                    document.body.classList.remove('youtube-tab-active');
                } else {
                    searchBarContainer.style.display = 'none';
                    document.body.classList.add('youtube-tab-active');
                }
            }
            
            // ---------- Helper: get course videos ----------
            function getCourseVideos(courseName) {
                return courseVideosData.filter(v => v.course === courseName).map((v, idx) => ({
                    id: `course_${courseName.replace(/\s/g, '_')}_${idx}`,
                    video_url: v.video_url,
                    creator_name: "Educational Channel",
                    caption: v.caption,
                    course: v.course,
                    level: "",
                    semester: "",
                    likes: localLikes.get(`course_${courseName.replace(/\s/g, '_')}_${idx}`) || 0,
                    views: localViews.get(`course_${courseName.replace(/\s/g, '_')}_${idx}`) || 0,
                    source: 'course'
                }));
            }
            
            function formatNumber(num) {
                if (num >= 1e6) return (num/1e6).toFixed(1)+'M';
                if (num >= 1e3) return (num/1e3).toFixed(1)+'k';
                return num;
            }
            
            function getYouTubeEmbed(url) {
                const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
                return match ? `https://www.youtube.com/embed/${match[1]}` : url;
            }
            
            function getYouTubeIframe(url) {
                const embed = getYouTubeEmbed(url);
                // Add playsinline and mute for Safari autoplay
                return `${embed}?enablejsapi=1&autoplay=1&mute=1&playsinline=1`;
            }
            
            function sendYouTubeCommand(iframe, command) {
                if (!iframe || !iframe.contentWindow) return;
                const message = JSON.stringify({ event: 'command', func: command, args: '' });
                iframe.contentWindow.postMessage(message, '*');
            }
            
            function updateMuteButtonIcon(reelElement) {
                if (!reelElement) return;
                const muteBtn = reelElement.querySelector('.mute-btn');
                if (muteBtn) muteBtn.textContent = isManuallyUnmuted ? '🔊' : '🔇';
            }
            
            function updateAllMuteButtons() {
                document.querySelectorAll('.reel-item').forEach(reel => updateMuteButtonIcon(reel));
            }
            
            function applyAudioToReel(reelElement, isActive) {
                if (!reelElement) return;
                const media = reelElement.querySelector('video') || reelElement.querySelector('iframe');
                if (!media) return;
                if (!isActive) {
                    if (media.tagName === 'VIDEO') { 
                        media.pause(); 
                        media.muted = true; 
                    }
                    else if (media.tagName === 'IFRAME' && media.src.includes('youtube.com/embed/')) {
                        sendYouTubeCommand(media, 'pauseVideo');
                        sendYouTubeCommand(media, 'mute');
                    }
                    return;
                }
                const shouldBeUnmuted = userInteracted && isManuallyUnmuted;
                if (media.tagName === 'VIDEO') {
                    media.muted = !shouldBeUnmuted;
                    media.play().catch(e => console.log('video play', e));
                } else if (media.tagName === 'IFRAME' && media.src.includes('youtube.com/embed/')) {
                    sendYouTubeCommand(media, 'playVideo');
                    shouldBeUnmuted ? sendYouTubeCommand(media, 'unMute') : sendYouTubeCommand(media, 'mute');
                }
            }
            
            function setActiveReel(newReelElement) {
                if (activeReelElement === newReelElement) return;
                if (activeReelElement) applyAudioToReel(activeReelElement, false);
                activeReelElement = newReelElement;
                if (activeReelElement) {
                    applyAudioToReel(activeReelElement, true);
                    updateMuteButtonIcon(activeReelElement);
                }
            }
            
            function toggleManualMute() {
                if (!userInteracted) userInteracted = true;
                isManuallyUnmuted = !isManuallyUnmuted;
                updateAllMuteButtons();
                if (activeReelElement) applyAudioToReel(activeReelElement, true);
            }
            
            async function countViewForReel(reelElement) {
                const id = reelElement.dataset.id;
                const source = reelElement.dataset.source;
                if (!id) return;
                if (source === 'course') {
                    if (localViews.has(id)) localViews.set(id, localViews.get(id) + 1);
                    else localViews.set(id, 1);
                    const viewsSpan = reelElement.querySelector('.overlay-btn:last-child span');
                    if (viewsSpan) viewsSpan.textContent = formatNumber(localViews.get(id));
                    return;
                }
                if (viewCountedSet.has(id)) return;
                viewCountedSet.add(id);
                try {
                    const res = await fetch(`/api/videos/${id}/view`, { method: 'POST', credentials: 'include' });
                    const data = await res.json();
                    const viewsSpan = reelElement.querySelector('.overlay-btn:last-child span');
                    if (viewsSpan) viewsSpan.textContent = formatNumber(data.views);
                } catch (err) { console.error('View increment failed', err); }
            }
            
            // Improved IntersectionObserver with stricter visibility and pausing
            let observer;
            function initIntersectionObserver() {
                if (observer) observer.disconnect();
                observer = new IntersectionObserver((entries) => {
                    let highestRatioEntry = null, maxRatio = 0;
                    for (const entry of entries) {
                        const reel = entry.target;
                        if (entry.isIntersecting && entry.intersectionRatio > maxRatio) {
                            maxRatio = entry.intersectionRatio;
                            highestRatioEntry = entry;
                        }
                        // Pause videos that are not visible enough
                        if (!entry.isIntersecting || entry.intersectionRatio < 0.3) {
                            const media = reel.querySelector('video') || reel.querySelector('iframe');
                            if (media) {
                                if (media.tagName === 'VIDEO') {
                                    media.pause();
                                } else if (media.tagName === 'IFRAME' && media.src.includes('youtube.com/embed/')) {
                                    sendYouTubeCommand(media, 'pauseVideo');
                                }
                            }
                        }
                    }
                    if (highestRatioEntry && highestRatioEntry.intersectionRatio >= 0.7) {
                        const targetReel = highestRatioEntry.target;
                        countViewForReel(targetReel);
                        setActiveReel(targetReel);
                    } else if (activeReelElement) {
                        const rect = activeReelElement.getBoundingClientRect();
                        const isVisible = rect.top < window.innerHeight && rect.bottom > 0;
                        if (!isVisible) { 
                            applyAudioToReel(activeReelElement, false); 
                            activeReelElement = null; 
                        }
                    }
                }, { threshold: [0.3, 0.7] });
                document.querySelectorAll('.reel-item').forEach(item => observer.observe(item));
            }
            
            function onFirstUserInteraction() {
                if (userInteracted) return;
                userInteracted = true;
                if (activeReelElement) applyAudioToReel(activeReelElement, true);
            }
            document.addEventListener('touchstart', onFirstUserInteraction, { once: true, passive: true });
            document.addEventListener('click', onFirstUserInteraction, { once: true });
            
            // Loading overlay helpers
            function addLoadingOverlay(reelMediaDiv) {
                if (reelMediaDiv.querySelector('.video-loading')) return;
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'video-loading';
                loadingDiv.innerHTML = '<div class="spinner"></div>';
                reelMediaDiv.appendChild(loadingDiv);
                return loadingDiv;
            }
            
            function removeLoadingOverlay(reelMediaDiv) {
                const loading = reelMediaDiv.querySelector('.video-loading');
                if (loading) loading.remove();
            }
            
            // ---------- RENDER LOGIC ----------
            function renderReel() {
                if (currentTab === 'uploaded') {
                    let items = uploadedVideos.filter(v => {
                        if (searchFilters.course && v.course !== searchFilters.course) return false;
                        if (searchFilters.level && v.level !== searchFilters.level) return false;
                        if (searchFilters.semester && v.semester !== searchFilters.semester) return false;
                        return true;
                    });
                    if (items.length === 0) {
                        reelContainer.innerHTML = `<div class="empty-reel">📤 No uploaded videos yet. Be the first to upload.</div>`;
                        activeReelElement = null; viewCountedSet.clear();
                        if (observer) observer.disconnect();
                        return;
                    }
                    let html = '';
                    items.forEach((item, idx) => {
                        const mediaUrl = item.video_url;
                        // Add playsinline, webkit-playsinline, preload=metadata, muted, loop
                        const mediaTag = `<video src="${mediaUrl}" playsinline webkit-playsinline loop preload="metadata" muted></video>`;
                        const deleteBtn = (isAdmin) ? `<div class="delete-overlay"><button class="delete-btn" onclick="deleteVideo('${item.id}', event)">🗑️ Delete</button></div>` : '';
                        html += `<div class="reel-item" data-id="${item.id}" data-type="uploaded" data-index="${idx}" data-source="backend">
                            <div class="reel-media">${mediaTag}</div>
                            ${deleteBtn}
                            <div class="video-info-bottom">
                                <div class="creator-name">@${item.creator_name || item.username || 'anonymous'}</div>
                                <div class="caption">${item.caption || ''}</div>
                                <div><span class="badge">${item.course}</span> ${item.level ? '<span class="badge">L'+item.level+'</span>' : ''} ${item.semester ? '<span class="badge">'+item.semester+'</span>' : ''}</div>
                            </div>
                            <div class="video-overlay-right">
                                <button class="overlay-btn mute-btn">${isManuallyUnmuted ? '🔊' : '🔇'}</button>
                                <button class="overlay-btn like-btn" data-id="${item.id}">❤️ <span class="like-count">${formatNumber(item.likes || 0)}</span></button>
                                <div class="overlay-btn">👁️ <span>${formatNumber(item.views || 0)}</span></div>
                            </div>
                        </div>`;
                    });
                    reelContainer.innerHTML = html;
                    attachReelListeners();
                    // Add loading overlay for each video until loadeddata
                    document.querySelectorAll('.reel-item video').forEach(video => {
                        const reelMedia = video.closest('.reel-media');
                        const loadingDiv = addLoadingOverlay(reelMedia);
                        video.addEventListener('loadeddata', () => {
                            removeLoadingOverlay(reelMedia);
                        }, { once: true });
                        // Fallback: remove after 3s if still loading
                        setTimeout(() => {
                            if (reelMedia.querySelector('.video-loading')) removeLoadingOverlay(reelMedia);
                        }, 3000);
                    });
                    viewCountedSet.clear();
                    activeReelElement = null;
                    initIntersectionObserver();
                    updateAllMuteButtons();
                    return;
                }
                
                // YOUTUBE TAB: show course selector or results
                if (youtubeSearchResults.length > 0) {
                    let html = '';
                    youtubeSearchResults.forEach((item, idx) => {
                        const iframeSrc = getYouTubeIframe(item.video_url);
                        const mediaTag = `<iframe src="${iframeSrc}" frameborder="0" allowfullscreen loading="lazy" allow="autoplay; encrypted-media" style="pointer-events: auto;"></iframe>`;
                        const likesCount = localLikes.get(item.id) !== undefined ? localLikes.get(item.id) : (item.likes || 0);
                        const viewsCount = localViews.get(item.id) !== undefined ? localViews.get(item.id) : (item.views || 0);
                        html += `<div class="reel-item" data-id="${item.id}" data-type="youtube-course" data-source="course">
                            <div class="reel-media">${mediaTag}</div>
                            <div class="video-info-bottom">
                                <div class="creator-name">🎬 ${item.creator_name}</div>
                                <div class="caption">${item.caption}</div>
                                <div><span class="badge">${item.course}</span></div>
                            </div>
                            <div class="video-overlay-right">
                                <button class="overlay-btn mute-btn">${isManuallyUnmuted ? '🔊' : '🔇'}</button>
                                <button class="overlay-btn like-btn" data-id="${item.id}">❤️ <span class="like-count">${formatNumber(likesCount)}</span></button>
                                <div class="overlay-btn">👁️ <span>${formatNumber(viewsCount)}</span></div>
                            </div>
                        </div>`;
                    });
                    reelContainer.innerHTML = html;
                    attachReelListeners();
                    viewCountedSet.clear();
                    activeReelElement = null;
                    initIntersectionObserver();
                    updateAllMuteButtons();
                } else {
                    // Show course selection UI
                    let courseOptions = uniqueCourses.map(c => `<option value="${c.replace(/"/g, '&quot;')}">${c}</option>`).join('');
                    reelContainer.innerHTML = `
                        <div class="youtube-course-panel">
                            <div class="search-prompt-icon">📚🎓</div>
                            <div class="course-selector-box">
                                <select id="courseSelect">
                                    <option value="">-- Select a course --</option>
                                    ${courseOptions}
                                </select>
                                <button id="loadCourseBtn">Load Videos</button>
                            </div>
                            <div class="search-prompt-text">Choose a course to watch educational reels</div>
                        </div>
                    `;
                    const courseSelect = document.getElementById('courseSelect');
                    const loadBtn = document.getElementById('loadCourseBtn');
                    if (loadBtn && courseSelect) {
                        loadBtn.addEventListener('click', () => {
                            const selected = courseSelect.value;
                            if (!selected) return;
                            youtubeSearchResults = getCourseVideos(selected);
                            renderReel();
                        });
                    }
                    if (observer) observer.disconnect();
                    activeReelElement = null;
                }
            }
            
            function attachReelListeners() {
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const reelDiv = btn.closest('.reel-item');
                        const source = reelDiv?.dataset.source;
                        if (source === 'course') {
                            let currentLikes = localLikes.get(id) || 0;
                            currentLikes++;
                            localLikes.set(id, currentLikes);
                            btn.querySelector('.like-count').textContent = formatNumber(currentLikes);
                            btn.classList.add('liked');
                            return;
                        }
                        try {
                            const res = await fetch(`/api/videos/${id}/like`, { method: 'POST', credentials: 'include' });
                            const data = await res.json();
                            btn.querySelector('.like-count').textContent = formatNumber(data.likes);
                            btn.classList.add('liked');
                        } catch (err) { console.error('Like failed', err); }
                    });
                });
                document.querySelectorAll('.mute-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation(); toggleManualMute(); });
                });
            }
            
            // ---------- Admin delete, search modal, upload handlers ----------
            window.deleteVideo = async function(id, e) {
                e.stopPropagation();
                if (!isAdmin) return;
                if (!confirm('Delete this video permanently?')) return;
                try {
                    const res = await fetch(`/api/videos/${id}`, { method: 'DELETE', credentials: 'include' });
                    if (res.ok) {
                        uploadedVideos = uploadedVideos.filter(v => v.id != id);
                        youtubeReels = youtubeReels.filter(v => v.id != id);
                        renderReel();
                    } else alert('Delete failed. Are you admin?');
                } catch (err) { alert('Error deleting video'); }
            };
            
            window.openSearchModal = function() {
                let html = `<div class="filter-group"><label>Course</label><select id="modalCourse" class="filter-select"><option value="">All Courses</option><option value="Biochemistry">Biochemistry</option><option value="Computer Science">Computer Science</option><option value="Physics">Physics</option><option value="Mathematics">Mathematics</option></select></div>
                    <div class="filter-group"><label>Level</label><select id="modalLevel" class="filter-select"><option value="">All Levels</option><option value="100">100</option><option value="200">200</option><option value="300">300</option><option value="400">400</option></select></div>
                    <div class="filter-group"><label>Semester</label><select id="modalSemester" class="filter-select"><option value="">All Semesters</option><option value="First Semester">First Semester</option><option value="Second Semester">Second Semester</option></select></div>
                    <div class="modal-actions"><button class="btn-primary" id="applySearchBtn">Apply</button><button class="btn-secondary" id="resetSearchBtn">Reset</button></div>`;
                searchModalBody.innerHTML = html;
                searchModal.classList.add('show');
                document.getElementById('applySearchBtn').addEventListener('click', () => {
                    searchFilters = { course: document.getElementById('modalCourse')?.value || '', level: document.getElementById('modalLevel')?.value || '', semester: document.getElementById('modalSemester')?.value || '' };
                    renderReel();
                    closeSearchModal();
                });
                document.getElementById('resetSearchBtn')?.addEventListener('click', () => { searchFilters = { course: '', level: '', semester: '' }; renderReel(); closeSearchModal(); });
            };
            window.closeSearchModal = () => searchModal.classList.remove('show');
            window.openUploadModal = () => uploadModal.classList.add('show');
            window.closeUploadModal = () => { uploadModal.classList.remove('show'); document.getElementById('uploadForm').reset(); setRequiredAttributes(); };
            
            function setRequiredAttributes() {
                document.querySelectorAll('#fileUploadFields input, #fileUploadFields select, #youtubeUploadFields input, #youtubeUploadFields select').forEach(el => el.required = false);
                if (currentUploadType === 'file') {
                    fileFields.classList.remove('hidden'); youtubeFields.classList.add('hidden');
                    ['videoTitle','videoCourse','videoLevel','videoSemester','videoCreator','videoFile'].forEach(id => document.getElementById(id).required = true);
                } else {
                    fileFields.classList.add('hidden'); youtubeFields.classList.remove('hidden');
                    ['ytTitle','ytCourse','ytSemester','ytCreator','ytLink'].forEach(id => document.getElementById(id).required = true);
                    document.getElementById('ytLevel').required = false;
                }
            }
            document.querySelectorAll('.toggle-option').forEach(opt => opt.addEventListener('click', () => {
                document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active'); currentUploadType = opt.dataset.type; setRequiredAttributes();
            }));
            setRequiredAttributes();
            
            window.handleUpload = async function(e) {
                e.preventDefault();
                if (currentUploadType === 'file') {
                    const title = document.getElementById('videoTitle').value.trim();
                    const course = document.getElementById('videoCourse').value;
                    const level = document.getElementById('videoLevel').value.trim();
                    const semester = document.getElementById('videoSemester').value;
                    const creator = document.getElementById('videoCreator').value.trim();
                    const file = document.getElementById('videoFile').files[0];
                    if (!title || !course || !level || !semester || !creator || !file) { alert('Please fill all fields and select a file'); return; }
                    const formData = new FormData();
                    formData.append('creator_name', creator); formData.append('department', 'General'); formData.append('course', course); formData.append('level', level);
                    formData.append('semester', semester); formData.append('caption', title); formData.append('bank_name', 'Demo Bank'); formData.append('account_number', '0000000000');
                    formData.append('video', file);
                    publishBtn.disabled = true; publishBtn.innerHTML = '<span class="spinner"></span> Uploading...';
                    try {
                        const res = await fetch('/video-upload', { method: 'POST', body: formData, credentials: 'include' });
                        if (res.redirected && res.url.includes('/videos')) { alert('✅ Video uploaded successfully!'); setTimeout(() => fetchVideos(), 500); }
                        else alert('Upload failed.');
                    } catch (err) { alert('Network error: ' + err.message); } finally { publishBtn.disabled = false; publishBtn.innerHTML = '🚀 Publish'; closeUploadModal(); }
                } else {
                    const title = document.getElementById('ytTitle').value.trim(), course = document.getElementById('ytCourse').value, level = document.getElementById('ytLevel').value.trim() || '100', semester = document.getElementById('ytSemester').value, creator = document.getElementById('ytCreator').value.trim(), link = document.getElementById('ytLink').value.trim();
                    if (!title || !course || !semester || !creator || !link) { alert('Please fill all required fields and enter a YouTube link'); return; }
                    const payload = { creator_name: creator, course, level, semester, caption: title, video_url: link, department: 'General', bank_name: 'Demo Bank', account_number: '0000000000' };
                    publishBtn.disabled = true; publishBtn.innerHTML = '<span class="spinner"></span> Publishing...';
                    try {
                        const res = await fetch('/api/videos/youtube', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), credentials: 'include' });
                        if (res.ok) { alert('✅ YouTube link added!'); fetchVideos(); } else alert('Failed to add YouTube link');
                    } catch (err) { alert('Network error: ' + err.message); } finally { publishBtn.disabled = false; publishBtn.innerHTML = '🚀 Publish'; closeUploadModal(); }
                }
            };
            
            window.switchTab = function(tab) {
                currentTab = tab;
                if (tab === 'uploaded') {
                    tabUploaded.classList.add('active'); tabYoutube.classList.remove('active');
                    searchFilters = { course: '', level: '', semester: '' };
                    youtubeSearchResults = [];
                } else {
                    tabYoutube.classList.add('active'); tabUploaded.classList.remove('active');
                    youtubeSearchResults = [];
                    searchFilters = { course: '', level: '', semester: '' };
                }
                updateGlobalFilterVisibility();
                renderReel();
            };
            
            window.toggleAdmin = function() {
                if (!isAdmin) { const pwd = prompt('Enter admin password:'); if (pwd === 'admin123') { isAdmin = true; adminBtn.classList.add('admin-active'); renderReel(); } else alert('Wrong'); }
                else { isAdmin = false; adminBtn.classList.remove('admin-active'); renderReel(); }
            };
            window.goBack = () => window.history.back();
            
            async function fetchVideos() {
                try {
                    const response = await fetch('/api/videos', { credentials: 'include' });
                    if (!response.ok) throw new Error('Failed to fetch');
                    const videos = await response.json();
                    uploadedVideos = videos.filter(v => !v.video_url.includes('youtube.com') && !v.video_url.includes('youtu.be'));
                    youtubeReels = videos.filter(v => v.video_url.includes('youtube.com') || v.video_url.includes('youtu.be'));
                    renderReel();
                } catch (err) { console.error(err); reelContainer.innerHTML = `<div class="empty-reel">⚠️ Could not load videos.</div>`; }
            }
            fetchVideos();
            updateGlobalFilterVisibility();
        })();
    </script>
</body>
